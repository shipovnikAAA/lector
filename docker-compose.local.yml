services:
  pg-dev:
    image: postgres:17
    restart: always
    ports:
      - "${DB_PORT:-5434}:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-psql}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_DB: ${DB_NAME:-ssiss}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant-dev:
    image: qdrant/qdrant:latest
    restart: always
    ports:
      - "6337:6333"
      - "6338:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: [ "CMD", "./qdrant", "--version" ]
      interval: 5s
      timeout: 3s
      retries: 5

  lector-ai:
    build:
      context: ./ai
    ports:
      - "${PORT:-6969}:${PORT:-6969}"
    depends_on:
      pg-dev:
        condition: service_healthy
      qdrant-dev:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-psql}@pg-dev:5432/${DB_NAME:-ssiss}

      # Vector Store
      QDRANT_URL: http://qdrant-dev:6334

      # LLM Provider (Pollinations)
      POLLINATIONS_API_KEY: ${POLLINATIONS_API_KEY}
      POLLINATIONS_MODEL: ${POLLINATIONS_MODEL:-openai}

      # App Settings
      PORT: ${PORT:-6969}
      HOST: ${HOST:-0.0.0.0}
      DEBUG: ${DEBUG:-True}
  # cloudflare-tunnel:
  #   image: cloudflare/cloudflared:latest
  #   container_name: lector-tunnel
  #   restart: always
  #   command: tunnel --url http://lector-ai:${PORT:-6969}
  #   depends_on:
  #     - lector-ai
  #   # environment:
  #   #   TUNNEL_TOKEN: ${TUNNEL_TOKEN}

volumes:
  qdrant_storage:
